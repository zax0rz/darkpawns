apiVersion: apps/v1
kind: Deployment
metadata:
  name: darkpawns-server
  namespace: darkpawns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: darkpawns-server
  template:
    metadata:
      labels:
        app: darkpawns-server
    spec:
      containers:
      - name: server
        image: ghcr.io/zax0rz/darkpawns:latest
        imagePullPolicy: Always
        env:
        - name: WORLD_DIR
          valueFrom:
            configMapKeyRef:
              name: darkpawns-config
              key: WORLD_DIR
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: darkpawns-config
              key: PORT
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: darkpawns-config
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: darkpawns-config
              key: REDIS_URL
        - name: AI_ENABLED
          valueFrom:
            configMapKeyRef:
              name: darkpawns-config
              key: AI_ENABLED
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: darkpawns-secrets
              key: POSTGRES_PASSWORD
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: world-data
          mountPath: /app/lib
          readOnly: true
      volumes:
      - name: world-data
        configMap:
          name: darkpawns-world
          optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: darkpawns-server
  namespace: darkpawns
spec:
  selector:
    app: darkpawns-server
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: darkpawns-ingress
  namespace: darkpawns
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/websocket-services: "darkpawns-server"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
  - host: darkpawns.labz0rz.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: darkpawns-server
            port:
              number: 8080