apiVersion: apps/v1
kind: Deployment
metadata:
  name: darkpawns-redis
  namespace: darkpawns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: darkpawns-redis
  template:
    metadata:
      labels:
        app: darkpawns-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["redis-server", "--appendonly", "yes"]
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: darkpawns-redis
  namespace: darkpawns
spec:
  selector:
    app: darkpawns-redis
  ports:
  - port: 6379
    targetPort: 6379