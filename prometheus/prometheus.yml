global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'darkpawns'
    static_configs:
      - targets: ['darkpawns-server:8080']
        labels:
          service: 'darkpawns'
          environment: 'production'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']