# Dark Pawns Documentation Site Nginx Configuration
# Supports content negotiation for dual rendering (HTML/Markdown)

server {
    listen 80;
    listen [::]:80;
    server_name darkpawns.labz0rz.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name darkpawns.labz0rz.com;
    
    # SSL certificates (configure these paths)
    ssl_certificate /etc/letsencrypt/live/darkpawns.labz0rz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/darkpawns.labz0rz.com/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Root directory for Hugo site
    root /var/www/darkpawns/docs/public;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/ld+json
        text/markdown;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # CORS for API endpoints
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Accept, Content-Type" always;
    
    # Content negotiation for documentation
    location /docs/ {
        # Remove /docs prefix for Hugo
        rewrite ^/docs(/.*)$ $1 break;
        
        # Check Accept header for content negotiation
        if ($http_accept ~* "text/markdown") {
            # Serve markdown version
            rewrite ^/(.*)$ /$1.md break;
            add_header Content-Type "text/markdown; charset=utf-8";
        }
        
        if ($http_accept ~* "application/json") {
            # Check if it's a search index request
            if ($request_uri ~* "/search-index\.json$") {
                rewrite ^/(.*)$ /$1 break;
                add_header Content-Type "application/json; charset=utf-8";
            }
        }
        
        # Default to HTML
        try_files $uri $uri/ $uri.html =404;
    }
    
    # API endpoints
    location /api/ {
        # OpenAPI specification
        if ($request_uri = /api/openapi.json) {
            alias /var/www/darkpawns/docs/public/api/openapi.json;
            add_header Content-Type "application/json; charset=utf-8";
        }
        
        # Default API response
        return 404 '{"error": "API endpoint not found", "docs": "/api/openapi.json"}';
    }
    
    # Search endpoint
    location /search-index.json {
        alias /var/www/darkpawns/docs/public/search-index.json;
        add_header Content-Type "application/json; charset=utf-8";
    }
    
    # Static assets
    location /static/ {
        alias /var/www/darkpawns/docs/public/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # CSS and JS
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Images
    location ~* \.(jpg|jpeg|png|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Fonts
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
    
    # Robots.txt
    location = /robots.txt {
        alias /var/www/darkpawns/docs/public/robots.txt;
    }
    
    # Sitemap
    location = /sitemap.xml {
        alias /var/www/darkpawns/docs/public/sitemap.xml;
    }
    
    # Favicon
    location = /favicon.ico {
        alias /var/www/darkpawns/docs/public/favicon.ico;
    }
    
    # 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Rate limiting for API endpoints
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    
    location ~ ^/api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
    }
}

# Redirect www to non-www
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.darkpawns.labz0rz.com;
    
    ssl_certificate /etc/letsencrypt/live/darkpawns.labz0rz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/darkpawns.labz0rz.com/privkey.pem;
    
    return 301 https://darkpawns.labz0rz.com$request_uri;
}