{{ define "main" }}
<article class="container content-narrow">
  <header class="article-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.date }}<time datetime="{{ .Format "2006-01-02" }}">{{ .Format "January 2, 2006" }}</time>{{ end }}
  </header>
  {{ if .Params.status }}
    {{ partial "status.html" . }}
  {{ end }}
  {{ if .Content }}
    <div class="prose">{{ .Content }}</div>
  {{ end }}
</article>
{{ end }}
