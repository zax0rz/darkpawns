{{ define "main" }}
<section class="splash">
  <div class="container">
    <h1 class="wordmark">DARK<br>PAWNS</h1>
    <p class="tagline">{{ .Site.Params.tagline }}</p>
    <p class="splash-desc">{{ .Site.Params.description }}</p>
    <div class="splash-actions">
      <a href="/play" class="btn btn-primary">Play Now</a>
      <a href="/about" class="btn btn-secondary">Learn More</a>
    </div>
    <hr class="splash-divider">
    <div class="splash-links">
      <a href="/news/" class="splash-link">News</a>
      <a href="/help/" class="splash-link">Help</a>
      <a href="/docs/" class="splash-link">Docs</a>
    </div>
  </div>
</section>
{{ end }}
