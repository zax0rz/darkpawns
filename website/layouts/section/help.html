{{ define "main" }}
<div class="container">
  <header class="section-header">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}
  </header>
  <p class="lead">Use your browser's find (Ctrl+F) or browse by category.</p>
  <div class="help-grid">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="card" style="border-bottom:none">
      <h2>{{ .Title }}</h2>
      {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
