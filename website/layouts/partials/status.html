<div class="card" id="status-card">
  <div aria-live="polite" id="status-display">
    <!-- Loading state -->
    <div id="status-loading" class="status-row">
      <span class="status-indicator status-indicator--loading"></span>
      <span class="status-label">Checking server status…</span>
    </div>

    <!-- Live state (filled by JS) -->
    <div id="status-live" style="display:none">
      <div class="status-grid">
        <div class="status-row">
          <span class="status-indicator" id="status-dot"></span>
          <span class="status-label" id="status-text">—</span>
        </div>
        <div class="status-row">
          <span class="status-key">Players Online</span>
          <span class="status-value" id="player-count">—</span>
        </div>
        <div class="status-row">
          <span class="status-key">Server Version</span>
          <span class="status-value" id="server-version">—</span>
        </div>
        <div class="status-row">
          <span class="status-key">Uptime</span>
          <span class="status-value" id="server-uptime">—</span>
        </div>
      </div>
      <p class="status-note" id="status-timestamp"></p>
    </div>

    <!-- Fallback state -->
    <div id="status-fallback" style="display:none">
      <div class="status-row">
        <span class="status-indicator status-indicator--unknown"></span>
        <span class="status-label">Server status unavailable</span>
      </div>
      <p class="status-note">
        The game server may be offline or undergoing maintenance. Check the
        <a href="/community/">community channels</a> for updates.
      </p>
    </div>
  </div>
</div>

<script>
(function () {
  var loading = document.getElementById('status-loading');
  var live = document.getElementById('status-live');
  var fallback = document.getElementById('status-fallback');
  var dot = document.getElementById('status-dot');
  var text = document.getElementById('status-text');
  var players = document.getElementById('player-count');
  var version = document.getElementById('server-version');
  var uptime = document.getElementById('server-uptime');
  var ts = document.getElementById('status-timestamp');

  function show(el) { el.style.display = ''; }
  function hide(el) { el.style.display = 'none'; }

  fetch('/api/status', { signal: AbortSignal.timeout(5000) })
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function (d) {
      hide(loading);

      if (d.online !== false) {
        dot.classList.add('status-indicator--online');
        text.textContent = 'Online';
      } else {
        dot.classList.add('status-indicator--offline');
        text.textContent = 'Offline';
      }

      players.textContent = (d.players != null) ? String(d.players) : '0';
      version.textContent = d.version || 'dev';
      uptime.textContent = d.uptime || 'unknown';

      ts.textContent = 'Last checked: ' + new Date().toLocaleTimeString();
      show(live);
    })
    .catch(function () {
      hide(loading);
      show(fallback);
    });
})();
</script>
