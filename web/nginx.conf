# Nginx configuration for Dark Pawns agent onboarding with content negotiation
server {
    listen 80;
    server_name darkpawns.labz0rz.com;
    
    root /var/www/darkpawns/web;
    
    # Content negotiation for onboarding
    location /onboarding {
        # Check Accept header for markdown
        if ($http_accept ~* "text/markdown") {
            rewrite ^ /onboarding/onboarding.md break;
        }
        
        # Check Accept header for JSON
        if ($http_accept ~* "application/json") {
            rewrite ^ /onboarding/onboarding.json break;
        }
        
        # Default to HTML
        rewrite ^ /onboarding/index.html break;
    }
    
    # Serve onboarding files directly
    location /onboarding/ {
        alias /var/www/darkpawns/web/onboarding/;
        
        # Set proper content types
        location ~* \.md$ {
            types { }
            default_type text/markdown;
            add_header Content-Type text/markdown;
        }
        
        location ~* \.json$ {
            types { }
            default_type application/json;
            add_header Content-Type application/json;
        }
        
        location ~* \.html$ {
            types { }
            default_type text/html;
            add_header Content-Type text/html;
        }
    }
    
    # API documentation
    location /api/openapi.json {
        alias /var/www/darkpawns/web/api/openapi.json;
        default_type application/json;
        add_header Content-Type application/json;
    }
    
    # Static files
    location /static/ {
        alias /var/www/darkpawns/web/static/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # Health check
    location /health {
        proxy_pass http://localhost:4350/health;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # WebSocket proxy
    location /ws {
        proxy_pass http://localhost:4350/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    
    # Default redirect to onboarding
    location / {
        return 302 /onboarding;
    }
}

